const b64d = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function decrypt(pw){
  const km = await crypto.subtle.importKey("raw", new TextEncoder().encode(pw), "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    {name:"PBKDF2", salt:b64d(SALT), iterations:ITER, hash:"SHA-256"},
    km, {name:"AES-GCM", length:256}, false, ["decrypt"]);
  const pt = await crypto.subtle.decrypt({name:"AES-GCM", iv:b64d(NONCE)}, key, b64d(CT));
  return new TextDecoder().decode(pt);
}

  e.preventDefault();
  const err = document.getElementById("err"); err.style.display = "none";
  try {
    const html = await decrypt(document.getElementById("pw").value);
    document.open(); document.write(html); document.close();
  } catch (_) { err.style.display = "block"; }
});
